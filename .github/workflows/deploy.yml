name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
        env:
          VITE_BASE: ${{ vars.VITE_BASE || '/' }}
          VITE_PRIVY_APP_ID: ${{ vars.VITE_PRIVY_APP_ID || 'cmbir1ip600bejx0mu6b42iek' }}
          VITE_API_BASE: ${{ vars.VITE_API_BASE || 'https://surfv2-sit-api.nfexinsider.com' }}
          VITE_USE_MOCK: ${{ vars.VITE_USE_MOCK || 'true' }}
          VITE_BIZ_PF: ${{ vars.VITE_BIZ_PF || '6' }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
