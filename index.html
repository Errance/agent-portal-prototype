<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TurboFlow Agent Portal</title>
    <style>
      @font-face {
        font-family: 'IBMPlexSans-Medium';
        src: url('https://fonts.gstatic.com/s/ibmplexsans/v19/zYX9KVElMYYaJe8bpLHnCwDKjQ76AI5sdP3pBmtF8A.woff2') format('woff2');
        font-weight: 500;
        font-style: normal;
      }
      @font-face {
        font-family: 'ISB';
        src: url('https://fonts.gstatic.com/s/ibmplexsans/v19/zYX9KVElMYYaJe8bpLHnCwDKjSL74I5sdP3pBmtF8A.woff2') format('woff2');
        font-weight: 600;
        font-style: normal;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #F4F5F7; border-radius: 3px; }
      ::-webkit-scrollbar-thumb { background: #DEDFE0; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #8E8E92; }
      /*
        Privy modal 非可关闭化：
        我们希望"未登录用户永远看不到业务 UI"（参见 RequireAuth + privy.tsx
        对 exited_auth_flow 的 re-open 策略）。视觉层面隐藏掉 Privy modal
        右上角的 ✕ 按钮，避免用户先看到"关闭提示"再被我们强行弹回——体验
        上直接就是一个不可关闭的登录窗。
        选择器两层都稳定：
          - #privy-dialog：Privy modal 根节点的固定 id
          - [aria-label="close modal"]：关闭按钮的语义 attribute
            （避开了 sc-xxx 这种 styled-components 自动生成的哈希类名）
        若未来 Privy SDK 改了上面任一属性，这条规则只会"失效"而不会崩，
        兜底仍有 privy.tsx 里的 queueMicrotask re-open 机制。
      */
      #privy-dialog button[aria-label="close modal"] { display: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // 与 public/404.html 配对的 SPA fallback 还原脚本，仅 BrowserRouter 模式生效。
      (function () {
        var l = window.location;
        if (l.search.indexOf('?p=') !== 0 && l.search.indexOf('&p=') < 0) return;
        var q = l.search.slice(1).split('&').reduce(function (acc, kv) {
          var i = kv.indexOf('=');
          if (i > 0) acc[kv.slice(0, i)] = decodeURIComponent(kv.slice(i + 1));
          return acc;
        }, {});
        if (!q.p) return;
        var path = q.p.replace(/~and~/g, '&');
        var search = q.q ? '?' + q.q.replace(/~and~/g, '&') : '';
        window.history.replaceState(null, '', l.pathname.replace(/\/$/, '') + path + search + l.hash);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
